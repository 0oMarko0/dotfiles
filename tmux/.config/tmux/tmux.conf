set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Palette
set -g @c_bg "#16181a"
set -g @c_bg_alt "#1e2124"
set -g @c_highlight "#3c4048"
set -g @c_fg "#ffffff"
set -g @c_grey "#7b8496"
set -g @c_green "#5eff6c"
set -g @c_blue "#5ea1ff"
set -g @c_cyan "#5ef1ff"
set -g @c_red "#ff6e5e"
set -g @c_yellow "#f1ff5e"
set -g @c_magenta "#ff5ef1"
set -g @c_pink "#ff5ea0"
set -g @c_orange "#ffbd5e"
set -g @c_purple "#bd5eff"

# Base status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#{@c_bg},fg=#{@c_fg}"
set -g status-justify centre

# Pane borders: subtle inactive, green focused
set -g pane-border-style "fg=#{@c_highlight}"
set -g pane-active-border-style "fg=#{@c_green}"

# Messages / command prompt
set -g message-style "bg=#{@c_highlight},fg=#{@c_fg}"
set -g message-command-style "bg=#{@c_highlight},fg=#{@c_green}"

# Copy mode / selection
set -g mode-style "bg=#{@c_green},fg=#{@c_bg}"

# Left status: session, command, path
set -g status-left-length 100
set -g status-left ""

set -ga status-left "#{?client_prefix,#[bg=#{@c_red},fg=#{@c_bg}]  #S ,#[bg=#{@c_bg_alt},fg=#{@c_green},bold]  #S }"
set -ga status-left "#[bg=#{@c_bg},fg=#{@c_highlight}]  "
set -ga status-left "#[bg=#{@c_bg_alt},fg=#{@c_magenta}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@c_bg},fg=#{@c_highlight}]  "
set -ga status-left "#[bg=#{@c_bg_alt},fg=#{@c_blue}]  #{=/-36/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# Right status: battery + date/time only
set -g status-right-length 100
set -g status-right ""

set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#[bg=#{@c_red},fg=#{@c_bg},bold],#[bg=#{@c_bg_alt},fg=#{@c_pink}]} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@c_bg},fg=#{@c_highlight}]  "
set -ga status-right "#[bg=#{@c_bg_alt},fg=#{@c_cyan}] 󰭦 %Y-%m-%d "
set -ga status-right "#[bg=#{@c_bg_alt},fg=#{@c_green}] 󰅐 %H:%M "

# Windows
set -wg automatic-rename on
set -g automatic-rename-format ""
set -g window-status-separator " "

# Inactive windows
set -g window-status-format "#[bg=#{@c_bg_alt},fg=#{@c_grey}] #I:#W "

# Active window: green highlight, like your focused Sway border
set -g window-status-current-format "#[bg=#{@c_green},fg=#{@c_bg},bold] #I:#W "

# Activity / bell / silence
set -g window-status-activity-style "bg=#{@c_orange},fg=#{@c_bg}"
set -g window-status-bell-style "bg=#{@c_red},fg=#{@c_bg},bold"

# Clock mode
set -g clock-mode-colour "#{@c_green}"
set -g clock-mode-style 24

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'